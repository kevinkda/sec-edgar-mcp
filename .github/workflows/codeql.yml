name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Mon 02:45 UTC — staggered from sibling repos to spread review load.
    - cron: "45 2 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
