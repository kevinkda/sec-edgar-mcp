# Dependabot configuration — sec-edgar-mcp
#
# Strategy:
# - Weekly cadence on Monday.
# - Group minor + patch into a single PR per ecosystem.
# - Ignore major-version bumps for the `mcp` SDK because those need the
#   1.x → 2.x compatibility checklist run manually.

version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 1
    assignees:
      - "kevinkda"
    reviewers:
      - "kevinkda"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      python-minor-and-patch:
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "mcp"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 1
    assignees:
      - "kevinkda"
    reviewers:
      - "kevinkda"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      actions-minor-and-patch:
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"
