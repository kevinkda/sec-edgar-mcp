# Dependabot configuration — sec-edgar-mcp
#
# Strategy:
# - Weekly cadence on Monday (low review fatigue; one PR per week max).
# - Group minor + patch into a single PR per ecosystem so the user does not
#   review N unrelated tiny bumps separately.
# - Ignore major-version bumps for the `mcp` SDK because any 1.x → 2.x bump
#   needs the compatibility checklist run manually.

version: 2
updates:
  # Python deps via uv.lock (pyproject.toml is the manifest).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 1
    assignees:
      - "kevinkda"
    reviewers:
      - "kevinkda"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      python-minor-and-patch:
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # mcp 1.x -> 2.x major bump requires a manual compatibility checklist.
      - dependency-name: "mcp"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions workflow versions (actions/checkout, astral-sh/setup-uv, ...).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 1
    assignees:
      - "kevinkda"
    reviewers:
      - "kevinkda"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      actions-minor-and-patch:
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"
